name: CI

on:
  pull_request:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --extra dev --frozen

      - name: Ruff
        run: uv run --no-sync ruff check src tests scripts

      - name: Mypy
        run: uv run --no-sync mypy src/enterprise_okf_ai --python-version 3.12

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies (frozen lockfile)
        run: uv sync --extra dev --frozen

      - name: Run test suite
        run: uv run --no-sync pytest -q
